<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Neon Snake</h1>
            <div class="score-board">
                <div class="score-card">
                    <span class="label">Pontos</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-card">
                    <span class="label">Recorde</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </header>

        <main class="game-content">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="440" height="440" tabindex="0"></canvas>
                
                <!-- Tela Inicial (Capa) -->
                <div id="start-screen" class="overlay">
                    <div class="glass-panel start-panel">
                        <img src="cover.png" alt="Neon Snake Cover" class="cover-image">
                        <div class="difficulty-selector">
                            <button class="diff-btn" data-diff="facil">Fácil</button>
                            <button class="diff-btn" data-diff="medio">Médio</button>
                            <button class="diff-btn" data-diff="dificil">Difícil</button>
                        </div>
                    </div>
                </div>

                <div id="game-over-screen" class="overlay hidden">
                    <div class="glass-panel">
                        <h2>Game Over</h2>
                        <p>Sua pontuação: <span id="final-score">0</span></p>
                        <div class="difficulty-selector">
                            <button class="diff-btn active" data-diff="facil">Fácil</button>
                            <button class="diff-btn" data-diff="medio">Médio</button>
                            <button class="diff-btn" data-diff="dificil">Difícil</button>
                        </div>
                        <button id="restart-btn" class="glow-button">Jogar Novamente</button>
                    </div>
                </div>
            </div>

            <aside class="side-panel">
                <button id="exit-btn" class="glow-button exit-btn">
                    <span style="font-size: 1.2rem;">🚪</span> Sair do Jogo
                </button>

                <div class="mini-leaderboard permanent">
                    <h3>🏆 TOP 5 RECORDES</h3>
                    <ul class="score-list" id="main-leaderboard-list"></ul>
                </div>
                
                <div class="controls-hint side">
                    <h3>🎮 Controles</h3>
                    <div class="key-grid">
                        <div class="key">W</div>
                        <div class="key-row">
                            <div class="key">A</div>
                            <div class="key">S</div>
                            <div class="key">D</div>
                        </div>
                    </div>
                    <p>W: Cima | S: Baixo<br>A: Esquerda | D: Direita</p>
                    <div class="power-hint" style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;">
                        <span style="color:#ffd700; font-weight:bold; font-size:0.85rem;">PODER (TECLA G)</span><br>
                        <span id="power-status" style="color:#39ff14; font-size:1.1rem; font-weight:800;">Pronto!</span>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
