<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Neon Snake</h1>
            <div class="score-board">
                <div class="score-card">
                    <span class="label">Pontos</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-card">
                    <span class="label">Recorde</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </header>

        <main class="canvas-wrapper">
            <canvas id="gameCanvas" width="440" height="440"></canvas>
            
            <div id="game-over-screen" class="overlay hidden">
                <div class="glass-panel">
                    <h2>Game Over</h2>
                    <p>Sua pontuação: <span id="final-score">0</span></p>
                    <button id="restart-btn" class="glow-button">Tentar Novamente</button>
                </div>
            </div>
        </main>

        <div class="controls-hint">
            <p>Use as <strong>setas do teclado</strong> ou <strong>W A S D</strong> para mover</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
